        <rect x="0"   width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="10"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="20"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="30"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="40"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="50"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="60"  width="8" height="18" rx="2" fill="#e0a92e"/><rect x="70"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="80"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="90"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="100" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="110" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="120" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="130" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="140" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="150" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="160" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="170" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="180" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="190" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="200" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="210" width="8" height="18" rx="2" fill="#3ecf8e"/>
      </g>
    </g>

    <!-- card 2: Checkout API (down) -->
    <g transform="translate(64,370)">
      <rect width="772" height="86" rx="14" fill="#16191e" stroke="#262b31"/>
      <circle cx="26" cy="30" r="6" fill="#3ecf8e"/>
      <text x="46" y="27" fill="#e8eaed" font-size="15" font-weight="600">Checkout API</text>
      <text x="46" y="45" fill="#9aa2ad" font-size="12">https://api.mystore.com/health</text>
      <text x="566" y="27" fill="#3ecf8e" font-size="12" font-weight="600">Operational</text>
      <rect x="632" y="16" width="52" height="18" rx="9" fill="none" stroke="#262b31"/>
      <text x="658" y="29" fill="#9aa2ad" font-size="11" text-anchor="middle">SSL 88d</text>
      <text x="756" y="29" fill="#9aa2ad" font-size="12" text-anchor="end">80 / 210 ms</text>
      <text x="756" y="45" fill="#9aa2ad" font-size="12" text-anchor="end">98.10% · 2s ago</text>
      <g transform="translate(20,58)">
        <rect x="0"   width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="10"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="20"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="30"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="40"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="50"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="60"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="70"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="80"  width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="90"  width="8" height="18" rx="2" fill="#e0a92e"/><rect x="100" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="110" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="120" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="130" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="140" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="150" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="160" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="170" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="180" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="190" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="200" width="8" height="18" rx="2" fill="#3ecf8e"/><rect x="210" width="8" height="18" rx="2" fill="#3ecf8e"/>
      </g>
    </g>

    <text x="450" y="500" fill="#6b7280" font-size="12" text-anchor="middle">Checked from multiple regions · alerts on confirmed outages · incident history →</text>
  </g>
</svg>
