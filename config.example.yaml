# Default monitors the containerized stack ships with, so a fresh clone shows
# something on first run. Add your real sites from the web page (they're saved in
# the database) — you don't need to edit this file.
#
# notify_emails: who gets an email when a monitor goes down / recovers. Needs
# SMTP configured on the evaluator (SMTP_HOST / SMTP_USER / SMTP_PASS).
monitors:
  - name: "Example"
    url: "https://example.com"
    interval_seconds: 30
    # notify_emails:
    #   - "you@example.com"
