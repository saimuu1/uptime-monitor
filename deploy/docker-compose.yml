# Full stack in containers. This mirrors what v4 deploys to the cloud.
#
#   docker compose -f deploy/docker-compose.yml up --build      # the whole thing
#   docker compose -f deploy/docker-compose.yml up db nats      # just infra (host dev)
#
# Inside this network, Postgres is reached at db:5432 and NATS at nats:4222.
# Host ports (5433, 4222, 8090, 8222) are only for tools on your laptop.

x-app-env: &app-env
  DATABASE_URL: postgres://uptime:uptime@db:5432/uptime?sslmode=disable
  NATS_URL: nats://nats:4222

x-build: &build-ctx
  context: ..
  dockerfile: deploy/Dockerfile

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: uptime-db
    environment:
      POSTGRES_USER: uptime
      POSTGRES_PASSWORD: uptime
      POSTGRES_DB: uptime
    ports:
      - "5433:5432" # host 5433 to avoid clashing with other local Postgres
    volumes:
      - uptime-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptime -d uptime"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: uptime-nats
    command: ["-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: create/upgrade the schema, then exit. Everything else waits on it.
  migrate:
    build:
      <<: *build-ctx
      args: { SERVICE: migrate }
    environment: *app-env
    depends_on:
      db: { condition: service_healthy }
    restart: "no"

  scheduler:
    build:
      <<: *build-ctx
      args: { SERVICE: scheduler }
    environment:
      <<: *app-env
      CONFIG_PATH: /config.yaml
    volumes:
      # Seed the DB on first run from the committed example (always present, so a
      # fresh clone just works). Add your real sites from the web page afterwards.
      - ../config.example.yaml:/config.yaml:ro
    depends_on:
      db: { condition: service_healthy }
      nats: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  checker_east:
    build:
      <<: *build-ctx
      args: { SERVICE: checker }
    environment:
      <<: *app-env
      REGION: east
    depends_on:
      nats: { condition: service_healthy }

  checker_west:
    build:
      <<: *build-ctx
      args: { SERVICE: checker }
    environment:
      <<: *app-env
      REGION: west
    depends_on:
      nats: { condition: service_healthy }

  evaluator:
    build:
      <<: *build-ctx
      args: { SERVICE: evaluator }
    environment:
      <<: *app-env
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db: { condition: service_healthy }
      nats: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  web:
    build:
      <<: *build-ctx
      args: { SERVICE: web }
    environment:
      <<: *app-env
      WEB_ADDR: ":8090"
    ports:
      - "8090:8090"
    depends_on:
      db: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  # Observability ("monitor the monitor"). Start with:
  #   docker compose -f deploy/docker-compose.yml --profile observability up
  prometheus:
    image: prom/prometheus:latest
    container_name: uptime-prometheus
    profiles: ["observability"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: uptime-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  uptime-db-data:
