<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set a new password · Uptime Monitor</title>
  <style>
    :root { --bg:#f6f7f9; --card:#fff; --text:#14171a; --muted:#6b7280; --border:#e6e8eb; --accent:#2f6bff; --down:#d63b3b; }
    @media (prefers-color-scheme: dark) { :root { --bg:#0e1013; --card:#16191e; --text:#e8eaed; --muted:#9aa2ad; --border:#262b31; --accent:#6c96ff; --down:#f2686a; } }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
           min-height:100vh; display:grid; place-items:center; }
    .card { width:340px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:28px; }
    .brand { display:flex; align-items:center; gap:10px; font-weight:650; font-size:18px; margin-bottom:6px; }
    .brand .logo { width:26px; height:26px; border-radius:8px; background:var(--accent); display:grid; place-items:center; color:#fff; }
    .sub { color:var(--muted); font-size:13px; margin-bottom:20px; }
    label { display:block; font-size:13px; color:var(--muted); margin:12px 0 5px; }
    input { width:100%; height:40px; padding:0 12px; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font:inherit; }
    button { width:100%; height:42px; margin-top:18px; border:none; border-radius:10px; background:var(--accent); color:#fff; font:inherit; font-weight:600; cursor:pointer; }
    .err { background:#fdecec; color:var(--down); border:1px solid var(--down); border-radius:8px; padding:9px 12px; font-size:13px; margin-bottom:6px; }
    .alt { text-align:center; margin-top:16px; font-size:13px; color:var(--muted); }
    .alt a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="logo">◒</span> Uptime Monitor</div>
    {{ if eq .Error "invalid" }}
      <div class="sub">Link problem.</div>
      <div class="err">This reset link is invalid or has expired.</div>
      <div class="alt"><a href="/forgot">Request a new link</a></div>
    {{ else }}
      <div class="sub">Choose a new password.</div>
      {{ if .Error }}<div class="err">{{ .Error }}</div>{{ end }}
      <form method="POST" action="/reset">
        <input type="hidden" name="token" value="{{ .Token }}">
        <label>New password <span style="opacity:.7">(8+ characters)</span></label>
        <input name="password" type="password" autocomplete="new-password" minlength="8" required autofocus>
        <button type="submit">Update password</button>
      </form>
    {{ end }}
  </div>
</body>
</html>
