<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incident history · Uptime Monitor</title>
  <style>
    :root {
      --bg: #f6f7f9; --card: #ffffff; --text: #14171a; --muted: #6b7280;
      --border: #e6e8eb; --up: #17915a; --down: #d63b3b; --accent: #2f6bff;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0e1013; --card: #16191e; --text: #e8eaed; --muted: #9aa2ad;
              --border: #262b31; --up: #3ecf8e; --down: #f2686a; --accent: #6c96ff; }
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
           font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 64px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 650; font-size: 18px; }
    .brand .logo { width: 26px; height: 26px; border-radius: 8px; background: var(--accent);
                   display: grid; place-items: center; color: #fff; font-size: 14px; }
    a.back { color: var(--accent); text-decoration: none; font-size: 14px; }
    h1 { font-size: 16px; margin: 0 0 16px; }
    .inc { display: flex; align-items: center; gap: 14px; background: var(--card);
           border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; margin-bottom: 8px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
    .dot.resolved { background: var(--up); } .dot.ongoing { background: var(--down); }
    .name { font-weight: 600; } .cause { color: var(--muted); font-size: 12.5px; word-break: break-all; }
    .meta { margin-left: auto; text-align: right; white-space: nowrap; font-size: 13px; }
    .dur { font-weight: 600; } .dur.ongoing { color: var(--down); }
    .when { color: var(--muted); font-size: 12px; }
    .empty { text-align: center; color: var(--muted); padding: 48px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand"><span class="logo">◒</span> Incident history</div>
      <a class="back" href="/">← back to status</a>
    </header>

    {{ range .Incidents }}
    <div class="inc">
      <span class="dot {{ if .Ongoing }}ongoing{{ else }}resolved{{ end }}"></span>
      <div>
        <div class="name">{{ .Monitor }}</div>
        <div class="cause">{{ .Cause }}</div>
      </div>
      <div class="meta">
        <div class="dur {{ if .Ongoing }}ongoing{{ end }}">{{ .Duration }}</div>
        <div class="when">{{ .When }}</div>
      </div>
    </div>
    {{ else }}
    <div class="empty">No incidents yet — everything's been up. 🎉</div>
    {{ end }}
  </div>
</body>
</html>
