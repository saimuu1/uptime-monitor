<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="10">
  <title>Status</title>
  <style>
    :root { color-scheme: light dark; }
    body { font: 15px/1.5 system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .sub { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .card { display: flex; align-items: center; gap: 1rem; padding: 0.9rem 1rem;
            border: 1px solid #8883; border-radius: 10px; margin-bottom: 0.6rem; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
    .up { background: #22c55e; } .down { background: #ef4444; } .nodata { background: #9ca3af; }
    .name { font-weight: 600; }
    .url { color: #888; font-size: 0.8rem; word-break: break-all; }
    .meta { margin-left: auto; text-align: right; font-size: 0.85rem; white-space: nowrap; }
    .pct { font-weight: 600; }
    .status-down { color: #ef4444; font-weight: 600; }
    .status-up { color: #22c55e; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Service status</h1>
  <div class="sub">{{ .UpCount }}/{{ len .Rows }} operational · updated {{ .Updated }} · auto-refresh 10s</div>

  {{ range .Rows }}
  <div class="card">
    <span class="dot {{ .DotClass }}"></span>
    <div>
      <div class="name">{{ .Name }}</div>
      <div class="url">{{ .URL }}</div>
    </div>
    <div class="meta">
      {{ if .Down }}<span class="status-down">DOWN</span>{{ else }}<span class="status-up">Operational</span>{{ end }}<br>
      <span class="pct">{{ .UptimePct }}</span> · {{ .LastCheck }}
    </div>
  </div>
  {{ else }}
  <p>No monitors configured.</p>
  {{ end }}
</body>
</html>
