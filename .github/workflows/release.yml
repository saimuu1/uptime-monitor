name: Release images

# Build each service image and push to GHCR so the cloud droplets can pull them.
# Triggered by a version tag (e.g. git tag v0.4.0 && git push --tags) or manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [scheduler, checker, evaluator, web, migrate]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/uptime-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/uptime-${{ matrix.service }}:${{ github.ref_name }}
